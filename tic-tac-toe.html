<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    :root {
      --bg: linear-gradient(160deg, #f7f3e8 0%, #dbe7f4 100%);
      --panel: rgba(255, 255, 255, 0.84);
      --line: #1f3a5f;
      --accent: #da5a3f;
      --accent-soft: #f4b183;
      --text: #162033;
      --muted: #5a6577;
      --shadow: 0 18px 45px rgba(22, 32, 51, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: min(100%, 460px);
      background: var(--panel);
      border: 1px solid rgba(31, 58, 95, 0.1);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .status {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(244, 177, 131, 0.18);
      color: var(--line);
      font-weight: 700;
      text-align: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .cell {
      aspect-ratio: 1;
      border: 0;
      border-radius: 20px;
      background: #fffdf9;
      color: var(--line);
      font-size: clamp(2.4rem, 10vw, 4rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(31, 58, 95, 0.1);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(31, 58, 95, 0.15), 0 10px 18px rgba(31, 58, 95, 0.12);
      background: #ffffff;
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.x {
      color: var(--accent);
    }

    .cell.o {
      color: var(--line);
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .button {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      background: var(--line);
      color: white;
    }

    .button.secondary {
      background: white;
      color: var(--line);
      box-shadow: inset 0 0 0 1px rgba(31, 58, 95, 0.14);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .score {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    .score strong {
      display: block;
      font-size: 1.2rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Tic Tac Toe</h1>
    <p class="subtitle">A simple human vs computer game in one file.</p>

    <div class="status" id="status">Your turn (X)</div>

    <section class="board" id="board" aria-label="Tic Tac Toe board"></section>

    <div class="actions">
      <button class="button primary" id="restart">New Round</button>
      <button class="button secondary" id="resetScores">Reset Score</button>
    </div>

    <section class="scoreboard" aria-label="Scoreboard">
      <div class="score">You<strong id="xScore">0</strong></div>
      <div class="score">Draws<strong id="drawScore">0</strong></div>
      <div class="score">Computer<strong id="oScore">0</strong></div>
    </section>
  </main>

  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const restartButton = document.getElementById("restart");
    const resetScoresButton = document.getElementById("resetScores");
    const xScoreEl = document.getElementById("xScore");
    const oScoreEl = document.getElementById("oScore");
    const drawScoreEl = document.getElementById("drawScore");

    const winningLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    let board = Array(9).fill("");
    let currentPlayer = "X";
    let isGameOver = false;
    let scores = { X: 0, O: 0, draw: 0 };
    const humanPlayer = "X";
    const computerPlayer = "O";

    function createBoard() {
      boardEl.innerHTML = "";

      board.forEach((value, index) => {
        const button = document.createElement("button");
        button.className = "cell";
        button.type = "button";
        button.setAttribute("aria-label", `Cell ${index + 1}`);
        button.dataset.index = index;
        button.textContent = value;
        button.disabled = Boolean(value) || isGameOver;

        if (value) {
          button.classList.add(value.toLowerCase());
        }

        button.addEventListener("click", handleMove);
        boardEl.appendChild(button);
      });
    }

    function handleMove(event) {
      const index = Number(event.currentTarget.dataset.index);

      if (board[index] || isGameOver || currentPlayer !== humanPlayer) {
        return;
      }

      board[index] = humanPlayer;
      finishTurn();
    }

    function finishTurn() {
      const winner = getWinner();
      if (winner) {
        isGameOver = true;
        scores[winner] += 1;
        updateStatus(winner === humanPlayer ? "You win!" : "Computer wins!");
      } else if (board.every(Boolean)) {
        isGameOver = true;
        scores.draw += 1;
        updateStatus("It's a draw!");
      } else {
        currentPlayer = currentPlayer === humanPlayer ? computerPlayer : humanPlayer;
        updateStatus(currentPlayer === humanPlayer ? "Your turn (X)" : "Computer is thinking...");
      }

      updateScores();
      createBoard();

      if (!isGameOver && currentPlayer === computerPlayer) {
        window.setTimeout(makeComputerMove, 350);
      }
    }

    function makeComputerMove() {
      if (isGameOver || currentPlayer !== computerPlayer) {
        return;
      }

      const bestMove = findBestMove();
      if (bestMove === null) {
        return;
      }

      board[bestMove] = computerPlayer;
      finishTurn();
    }

    function findBestMove() {
      const openCells = board
        .map((value, index) => (value ? null : index))
        .filter((value) => value !== null);

      for (const index of openCells) {
        board[index] = computerPlayer;
        if (getWinner() === computerPlayer) {
          board[index] = "";
          return index;
        }
        board[index] = "";
      }

      for (const index of openCells) {
        board[index] = humanPlayer;
        if (getWinner() === humanPlayer) {
          board[index] = "";
          return index;
        }
        board[index] = "";
      }

      const preferredMoves = [4, 0, 2, 6, 8, 1, 3, 5, 7];
      return preferredMoves.find((index) => board[index] === "") ?? null;
    }

    function getWinner() {
      for (const [a, b, c] of winningLines) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return null;
    }

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    function updateScores() {
      xScoreEl.textContent = scores.X;
      oScoreEl.textContent = scores.O;
      drawScoreEl.textContent = scores.draw;
    }

    function resetBoard() {
      board = Array(9).fill("");
      currentPlayer = humanPlayer;
      isGameOver = false;
      updateStatus("Your turn (X)");
      createBoard();
    }

    restartButton.addEventListener("click", resetBoard);
    resetScoresButton.addEventListener("click", () => {
      scores = { X: 0, O: 0, draw: 0 };
      updateScores();
      resetBoard();
    });

    updateScores();
    createBoard();
  </script>
</body>
</html>
